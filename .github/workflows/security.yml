name: Run Security Information to Discord

on:
  schedule:
    - cron: '30 * * * *'   # 毎時30分
  workflow_dispatch:

jobs:
  run-security:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run main.py
        id: run_the_hacker_news
        continue-on-error: true
        env:
          FEED_URL: https://feeds.feedburner.com/TheHackersNews
          WEBHOOK_URL: ${{ secrets.DISCORD_SECURITY_WEBHOOK_URL }}
          NAME: The Hackers News
          TRANSLATE: true
          FETCH_MODE: hours
          HOURS: 1
          DIFF_DAYS: 1
        run: |
          max_retries=3
          attempt=1

          while [ $attempt -le $max_retries ]; do
            echo "【The Hackers News】 Attempt ${attempt}/${max_retries}"

            if uv run python main.py "$FEED_URL" "$WEBHOOK_URL" "$NAME" "$TRANSLATE" "$FETCH_MODE" "$HOURS" "$DIFF_DAYS"; then
              echo "[The Hackers News] Succeeded on attempt ${attempt}."
              exit 0
            fi

            if [ $attempt -lt $max_retries ]; then
              echo "[The Hackers News] Failed on attempt ${attempt}. Retrying..."
              sleep 5
            fi

            attempt=$((attempt + 1))
          done

          echo "[the hacker news] Failed after ${max_retries} attempts."
          exit 1

      - name: Run main.py (alternate FEED_URL)
        id: run_cybersecurity_news
        continue-on-error: true
        env:
          FEED_URL: https://cybersecuritynews.com/feed/
          WEBHOOK_URL: ${{ secrets.DISCORD_SECURITY_WEBHOOK_URL }}
          NAME: Cybersecurity News
          TRANSLATE: true
          FETCH_MODE: hours
          HOURS: 1
          DIFF_DAYS: 1
        run: |
          max_retries=3
          attempt=1

          while [ $attempt -le $max_retries ]; do
            echo "【Cybersecurity News】 Attempt ${attempt}/${max_retries}"

            if uv run python main.py "$FEED_URL" "$WEBHOOK_URL" "$NAME" "$TRANSLATE" "$FETCH_MODE" "$HOURS" "$DIFF_DAYS"; then
              echo "【Cybersecurity News】 Succeeded on attempt ${attempt}."
              exit 0
            fi

            if [ $attempt -lt $max_retries ]; then
              echo "【Cybersecurity News】 Failed on attempt ${attempt}. Retrying..."
              sleep 5
            fi

            attempt=$((attempt + 1))
          done

          echo "【Cybersecurity News】 Failed after ${max_retries} attempts."
          exit 1

      - name: Run main.py
        id: run_darkreading
        continue-on-error: true
        env:
          FEED_URL: https://www.darkreading.com/rss.xml
          WEBHOOK_URL: ${{ secrets.DISCORD_SECURITY_WEBHOOK_URL }}
          NAME: Dark Reading
          TRANSLATE: true
          FETCH_MODE: hours
          HOURS: 1
          DIFF_DAYS: 1
        run: |
          max_retries=3
          attempt=1

          while [ $attempt -le $max_retries ]; do
            echo "【Dark Reading】 Attempt ${attempt}/${max_retries}"

            if uv run python main.py "$FEED_URL" "$WEBHOOK_URL" "$NAME" "$TRANSLATE" "$FETCH_MODE" "$HOURS" "$DIFF_DAYS"; then
              echo "[Dark Reading] Succeeded on attempt ${attempt}."
              exit 0
            fi

            if [ $attempt -lt $max_retries ]; then
              echo "[Dark Reading] Failed on attempt ${attempt}. Retrying..."
              sleep 5
            fi

            attempt=$((attempt + 1))
          done

          echo "[Dark Reading] Failed after ${max_retries} attempts."
          exit 1

      - name: Finalize result
        if: always()
        run: |
          echo "run_security outcome: ${{ steps.run_security.outcome }}"

          failed=0
          [ "${{ steps.run_security.outcome }}" = "failure" ] && failed=1

          if [ $failed -ne 0 ]; then
            echo "One or more feed runs failed after retries."
            echo "## ❌ Workflow failed" >> "$GITHUB_STEP_SUMMARY"
            echo "At least one feed failed even after 3 attempts." >> "$GITHUB_STEP_SUMMARY"
            echo "- run_security: ${{ steps.run_security.outcome }}" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::One or more feed runs failed after 3 attempts."
            exit 1
          fi

          echo "## ✅ Workflow succeeded" >> "$GITHUB_STEP_SUMMARY"
          echo "All feed runs succeeded within up to 3 attempts." >> "$GITHUB_STEP_SUMMARY"
          echo "All feed runs succeeded."